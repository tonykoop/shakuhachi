<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 320"
     font-family="Helvetica, Arial, sans-serif" font-size="12">
  <title>SHK-D4-P1 — Pre-Bore Blank</title>
  <desc>Square cherry blank, 1.000 × 1.000 × 24.000 in. Centerlines marked on both end faces.</desc>

  <rect x="0" y="0" width="1100" height="320" fill="#ffffff"/>

  <!-- Side elevation: 24 in long * 30 px/in = 720 px wide; 1 in tall * 30 = 30 px -->
  <g transform="translate(80, 80)">
    <!-- Square stock -->
    <rect x="0" y="0" width="720" height="30" fill="#f6efe1" stroke="#222" stroke-width="1.5"/>
    <!-- Centerline -->
    <line x1="-15" y1="15" x2="735" y2="15" stroke="#444" stroke-width="0.6"
          stroke-dasharray="10 2 2 2"/>

    <!-- Waste regions (0.5 in each end shaded) -->
    <rect x="0"   y="0" width="15"  height="30" fill="#aaa" fill-opacity="0.3"/>
    <rect x="705" y="0" width="15"  height="30" fill="#aaa" fill-opacity="0.3"/>
    <text x="7.5" y="-5" text-anchor="middle" font-size="9" fill="#666">waste</text>
    <text x="712.5" y="-5" text-anchor="middle" font-size="9" fill="#666">waste</text>

    <!-- End-face markers -->
    <line x1="0" y1="-12" x2="0" y2="50" stroke="#222" stroke-width="1.2"/>
    <line x1="720" y1="-12" x2="720" y2="50" stroke="#222" stroke-width="1.2"/>
    <text x="0" y="-22" text-anchor="middle" font-size="11" font-weight="bold">B (foot end)</text>
    <text x="720" y="-22" text-anchor="middle" font-size="11" font-weight="bold">utaguchi end</text>

    <!-- Length dimension -->
    <line x1="0" y1="65" x2="720" y2="65" stroke="#222" stroke-width="0.8"/>
    <line x1="0" y1="58" x2="0" y2="72" stroke="#222" stroke-width="0.8"/>
    <line x1="720" y1="58" x2="720" y2="72" stroke="#222" stroke-width="0.8"/>
    <text x="360" y="80" text-anchor="middle" font-size="13">24.00 in (overall blank)</text>

    <!-- Finish length dimension (below) -->
    <line x1="15" y1="100" x2="705" y2="100" stroke="#222" stroke-width="0.8"/>
    <line x1="15" y1="93" x2="15" y2="107" stroke="#222" stroke-width="0.8"/>
    <line x1="705" y1="93" x2="705" y2="107" stroke="#222" stroke-width="0.8"/>
    <text x="360" y="115" text-anchor="middle" font-size="13">23.00 in working stock (after waste-end trim)</text>

    <!-- Cross section detail (left) -->
    <g transform="translate(-50, 150)">
      <rect x="0" y="0" width="30" height="30" fill="#f6efe1" stroke="#222" stroke-width="1.0"/>
      <!-- Center mark -->
      <circle cx="15" cy="15" r="2" fill="#222"/>
      <line x1="15" y1="-2" x2="15" y2="32" stroke="#444" stroke-width="0.5" stroke-dasharray="2 2"/>
      <line x1="-2" y1="15" x2="32" y2="15" stroke="#444" stroke-width="0.5" stroke-dasharray="2 2"/>
      <text x="15" y="50" text-anchor="middle" font-size="10">END SECTION</text>
      <text x="15" y="62" text-anchor="middle" font-size="10">1.00 × 1.00 in square</text>
    </g>
  </g>

  <!-- Notes -->
  <g transform="translate(80, 220)" font-size="11" fill="#222">
    <text y="0" font-weight="bold">Notes:</text>
    <text y="16">1. Quarter-sawn cherry, kiln-dried &lt; 8% moisture content. Inspect for runout, knots, internal checks.</text>
    <text y="32">2. Mill to 1.000 × 1.000 ± 0.005 in. Square check with combination square; reject any blank with wind or twist &gt; 0.010 in over 24 in.</text>
    <text y="48">3. Center-mark both end faces with a center-finder; punch with awl. The center punches are the bore-axis reference.</text>
    <text y="64">4. Bore-axis offset from any face: 0.500 in (nominal centered).</text>
  </g>

  <!-- Title block -->
  <g transform="translate(700, 200)">
    <rect x="0" y="0" width="380" height="80" fill="none" stroke="#222" stroke-width="1.0"/>
    <line x1="0" y1="20" x2="380" y2="20" stroke="#222" stroke-width="0.8"/>
    <line x1="0" y1="40" x2="380" y2="40" stroke="#222" stroke-width="0.8"/>
    <line x1="0" y1="60" x2="380" y2="60" stroke="#222" stroke-width="0.8"/>
    <line x1="190" y1="20" x2="190" y2="80" stroke="#222" stroke-width="0.8"/>
    <text x="6" y="14" font-size="11" font-weight="bold">Project: Shakuhachi (SHK-D4-P1)</text>
    <text x="6" y="34" font-size="11">Drawing: Pre-Bore Blank</text>
    <text x="6" y="54" font-size="11">Stage: pre-machining</text>
    <text x="196" y="34" font-size="11">Scale: 1:4</text>
    <text x="196" y="54" font-size="11">Units: inches</text>
    <text x="6" y="74" font-size="11">Material: cherry, qtr-sawn</text>
    <text x="196" y="74" font-size="11">Date: 2026-05-07  Rev: A</text>
  </g>
</svg>
