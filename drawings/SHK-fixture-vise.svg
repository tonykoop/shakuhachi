<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 600"
     font-family="Helvetica, Arial, sans-serif" font-size="12">
  <title>SHK-fixture-vise — Tailstock vise / square-stock carrier</title>
  <desc>Welded steel-angle vise for headstock-driven deep-bore drilling. MT2 shank, V-channel, side clamps. Scale 1:2.</desc>

  <rect x="0" y="0" width="1100" height="600" fill="#ffffff"/>

  <!-- Top view (top of drawing) -->
  <g transform="translate(80, 80)">
    <text x="0" y="-20" font-size="13" font-weight="bold">TOP VIEW</text>

    <!-- 6 in V-channel = 240 px @ 40 px/in; 1.5 in width = 60 px -->
    <rect x="0" y="0" width="240" height="60" fill="#eee" stroke="#222" stroke-width="1.5"/>
    <!-- V groove (90 deg) projection -->
    <line x1="0" y1="30" x2="240" y2="30" stroke="#888" stroke-width="0.6" stroke-dasharray="4 2"/>
    <!-- Side clamp screw positions -->
    <circle cx="60" cy="30" r="4" fill="#fff" stroke="#222" stroke-width="1.0"/>
    <circle cx="180" cy="30" r="4" fill="#fff" stroke="#222" stroke-width="1.0"/>
    <text x="60" y="80" font-size="10" text-anchor="middle">3/8-16 clamp #1 @ 1.5 in</text>
    <text x="180" y="80" font-size="10" text-anchor="middle">3/8-16 clamp #2 @ 4.5 in</text>

    <!-- Workpiece phantom (square 1x1 blank) -->
    <rect x="20" y="10" width="200" height="40" fill="none" stroke="#0a6"
          stroke-width="0.8" stroke-dasharray="3 2"/>
    <text x="120" y="35" text-anchor="middle" font-size="10" fill="#0a6">workpiece (phantom)</text>

    <!-- MT2 shank rear -->
    <rect x="240" y="22" width="90" height="16" fill="#ddd" stroke="#222" stroke-width="1.2"/>
    <text x="285" y="55" text-anchor="middle" font-size="10">MT2 shank → tailstock</text>

    <!-- Length dimension -->
    <line x1="0" y1="-20" x2="240" y2="-20" stroke="#222" stroke-width="0.8"/>
    <line x1="0" y1="-25" x2="0" y2="-15" stroke="#222" stroke-width="0.8"/>
    <line x1="240" y1="-25" x2="240" y2="-15" stroke="#222" stroke-width="0.8"/>
    <text x="120" y="-30" text-anchor="middle" font-size="11">6.00 in</text>

    <!-- Width dimension -->
    <line x1="-15" y1="0" x2="-15" y2="60" stroke="#222" stroke-width="0.8"/>
    <line x1="-20" y1="0" x2="-10" y2="0" stroke="#222" stroke-width="0.8"/>
    <line x1="-20" y1="60" x2="-10" y2="60" stroke="#222" stroke-width="0.8"/>
    <text x="-25" y="34" text-anchor="end" font-size="11">1.50 in</text>
  </g>

  <!-- Side view -->
  <g transform="translate(80, 280)">
    <text x="0" y="-20" font-size="13" font-weight="bold">SIDE VIEW</text>

    <!-- Steel angle 1.5 x 1.5 x 1/8 in -->
    <path d="M 0,0 L 240,0 L 240,5 L 5,5 L 5,60 L 0,60 Z"
          fill="#ddd" stroke="#222" stroke-width="1.5"/>
    <!-- Side wall opposite -->
    <path d="M 0,80 L 240,80 L 240,75 L 5,75 L 5,80 Z"
          fill="#ddd" stroke="#222" stroke-width="1.5"/>

    <!-- V-block insert (45 deg internal) -->
    <polygon points="20,5 60,30 100,5" fill="#ccc" stroke="#222" stroke-width="0.8"/>
    <text x="60" y="22" text-anchor="middle" font-size="10">V-block (90°)</text>

    <!-- Workpiece phantom -->
    <rect x="40" y="20" width="160" height="20" fill="none" stroke="#0a6"
          stroke-width="0.8" stroke-dasharray="3 2"/>

    <!-- Side-clamp screws (vertical) -->
    <line x1="60" y1="0" x2="60" y2="-15" stroke="#222" stroke-width="2.0"/>
    <line x1="60" y1="40" x2="60" y2="60" stroke="#222" stroke-width="0.8"/>
    <line x1="180" y1="0" x2="180" y2="-15" stroke="#222" stroke-width="2.0"/>
    <line x1="180" y1="40" x2="180" y2="60" stroke="#222" stroke-width="0.8"/>

    <!-- Spindle axis -->
    <line x1="-30" y1="30" x2="350" y2="30" stroke="#0a6" stroke-width="0.6"
          stroke-dasharray="10 2 2 2"/>
    <text x="-40" y="34" font-size="10" fill="#0a6" text-anchor="end">spindle axis</text>

    <!-- MT2 shank in side view -->
    <rect x="240" y="22" width="90" height="16" fill="#ddd" stroke="#222" stroke-width="1.2"/>
    <text x="285" y="50" text-anchor="middle" font-size="10">MT2 shank</text>

    <!-- Drill bit phantom (left side, would advance from spindle) -->
    <line x1="-50" y1="30" x2="-15" y2="30" stroke="#222" stroke-width="2.5"/>
    <text x="-32" y="22" text-anchor="middle" font-size="10">→ bit</text>
  </g>

  <!-- Notes block -->
  <g transform="translate(80, 440)" font-size="11" fill="#222">
    <text y="0" font-weight="bold">Notes:</text>
    <text y="18">1. Built from 1.5 × 1.5 × 1/8 in cold-rolled steel angle (SHK-SRC-013), welded.</text>
    <text y="36">2. MT2 shank size set per Tony's lathe spindle taper. If MT3, change shank only — V-channel unchanged.</text>
    <text y="54">3. Side clamps are 3/8-16 zinc threaded rod (SHK-SRC-014) tapped through the angle's vertical flange.</text>
    <text y="72">4. Indicate centerline runout to spindle axis &lt; 0.005 in before any production drilling. Re-shim if drift.</text>
    <text y="90">5. Reference: instrument-maker#84 § Fixture Requirements; references/techniques/headstock-driven-deep-bore-drilling.md.</text>
  </g>

  <!-- Title block -->
  <g transform="translate(700, 480)">
    <rect x="0" y="0" width="380" height="92" fill="none" stroke="#222" stroke-width="1.0"/>
    <line x1="0" y1="22" x2="380" y2="22" stroke="#222" stroke-width="0.8"/>
    <line x1="0" y1="44" x2="380" y2="44" stroke="#222" stroke-width="0.8"/>
    <line x1="0" y1="66" x2="380" y2="66" stroke="#222" stroke-width="0.8"/>
    <line x1="190" y1="22" x2="190" y2="92" stroke="#222" stroke-width="0.8"/>
    <text x="6" y="16" font-size="11" font-weight="bold">Project: Shakuhachi (SHK-D4-P1)</text>
    <text x="6" y="38" font-size="11">Drawing: Tailstock Vise (fixture)</text>
    <text x="6" y="60" font-size="11">Use: deep-bore drilling</text>
    <text x="196" y="38" font-size="11">Scale: 1:2</text>
    <text x="196" y="60" font-size="11">Units: inches</text>
    <text x="6" y="82" font-size="11">Material: cold-rolled steel + Zn rod</text>
    <text x="196" y="82" font-size="11">Date: 2026-05-07  Rev: A</text>
  </g>
</svg>
